services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on: {}

    nuxt:
        image: 'node:20-alpine'
        working_dir: /var/www/html/frontend
        environment:
            HOST: 0.0.0.0
        volumes:
            - '.:/var/www/html'
            - 'nuxt_node_modules:/var/www/html/frontend/node_modules'
        ports:
            - '3000:3000'
        command: sh -c "npm install && npm run dev"
        networks:
            - sail
        depends_on:
            - laravel.test

    nginx:
        image: 'nginx:alpine'
        ports:
            - '${APP_PORT:-80}:80'
        volumes:
            - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf'
            - './public/docs:/var/www/html/public/docs'
        networks:
            - sail
        depends_on:
            - laravel.test
            - nuxt

networks:
    sail:
        driver: bridge

volumes:
    nuxt_node_modules:
